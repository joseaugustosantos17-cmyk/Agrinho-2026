<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroForte | Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <nav class="container">
            <div class="logo">AGRO<span>FORTE</span></div>
            <ul class="nav-menu">
                <li><a href="#home">Início</a></li>
                <li><a href="#simulador">Simulador</a></li>
                <li><a href="#contato">Mensagem</a></li>
            </ul>
            <button id="theme-toggle" title="Alternar Modo Escuro">
                <span id="theme-icon">🌙</span>
            </button>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content container">
                <h1 id="welcome-text">Inovação Verde no Campo</h1>
                <p>Equilibrando produção e biodiversidade.</p>
                <div class="user-interaction">
                    <label for="user-name-input">Seu nome:</label>
                    <input type="text" id="user-name-input" placeholder="Digite aqui...">
                    <button id="btn-start" class="btn-primary">Personalizar</button>
                </div>
            </div>
        </section>

        <section id="simulador" class="container">
            <h2>Simulador Sustentável</h2>
            <div class="simulador-box">
                <button class="btn-action" data-points="10">Plantar Árvores</button>
                <button class="btn-action" data-points="15">Irrigação Inteligente</button>
                <p>Pontos de Sustentabilidade: <strong id="score-counter">0</strong></p>
                <p id="farm-status">Status: Aguardando ações...</p>
            </div>
        </section>

        <section id="contato" class="container">
            <form id="contact-form">
                <label for="msg">Sua sugestão para o futuro:</label>
                <textarea id="msg" required></textarea>
                <button type="submit" class="btn-primary">Enviar</button>
                <p id="form-feedback" class="hidden">Obrigado! Mensagem enviada.</p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AgroForte - Agrinho: Equilíbrio e Futuro.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
